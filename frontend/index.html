<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>МаркетПульс</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <img class="brand-logo" src="./assets/logo.png" alt="" />
        </div>
        <div class="brand-copy">
          <h1><span>Маркет</span><strong>Пульс</strong></h1>
          <p id="sessionInfo">Войдите в систему</p>
        </div>
      </div>

      <nav class="tabs" aria-label="Разделы приложения">
        <button class="tab-button active" type="button" data-tab="products">Товары</button>
        <button class="tab-button" type="button" data-tab="orders">Заказы</button>
        <button class="tab-button" type="button" data-tab="movements">Движение склада</button>
      </nav>

      <form id="loginForm" class="login-form">
        <input id="username" name="username" autocomplete="username" placeholder="Логин" value="admin" />
        <input id="password" name="password" autocomplete="current-password" placeholder="Пароль" type="password" value="admin123" />
        <button type="submit">Войти</button>
      </form>

      <div id="profileBox" class="profile-box" hidden>
        <div class="profile-text">
          <strong id="profileName">Пользователь</strong>
          <span id="profileRole">Роль</span>
        </div>
        <button id="logoutButton" class="secondary" type="button">Выйти</button>
      </div>
    </header>

    <main class="layout">
      <section id="productsTab" class="panel tab-panel active">
        <div class="panel-head">
          <h2>Товары</h2>
          <div class="panel-actions">
            <label class="filter-control">
              Категория
              <select id="categoryFilter">
                <option value="">Все категории</option>
              </select>
            </label>
            <button id="reloadProducts" type="button">Обновить</button>
          </div>
        </div>
        <form id="productForm" class="grid-form">
          <input name="sku" placeholder="SKU" required />
          <input name="name" placeholder="Название" required />
          <input name="category" placeholder="Категория" required />
          <input name="location" placeholder="Ячейка" required />
          <input name="quantity" placeholder="Остаток" type="number" min="0" required />
          <input name="min_quantity" placeholder="Минимум" type="number" min="0" required />
          <button type="submit">Добавить товар</button>
        </form>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>SKU</th>
                <th>Название</th>
                <th>Категория</th>
                <th>Ячейка</th>
                <th>Остаток</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="productsBody"></tbody>
          </table>
        </div>
      </section>

      <section id="ordersTab" class="panel tab-panel">
        <div class="panel-head">
          <h2>Заказы</h2>
          <button id="reloadOrders" type="button">Обновить</button>
        </div>
        <form id="orderForm" class="grid-form order-form">
          <input name="customer_name" placeholder="Клиент" required />
          <select name="product_id" id="orderProduct"></select>
          <input name="quantity" placeholder="Количество" type="number" min="1" required />
          <button type="submit">Создать заказ</button>
        </form>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Клиент</th>
                <th>Статус</th>
                <th>Позиции</th>
                <th></th>
                <th></th>
              </tr>
            </thead>
            <tbody id="ordersBody"></tbody>
          </table>
        </div>
      </section>

      <section id="movementsTab" class="panel tab-panel">
        <div class="panel-head">
          <h2>Движение склада</h2>
          <button id="reloadMovements" type="button">Обновить</button>
        </div>
        <form id="movementForm" class="grid-form movement-form">
          <select name="product_id" id="movementProduct"></select>
          <select name="movement_type">
            <option value="inbound">Приход</option>
            <option value="outbound">Расход</option>
            <option value="adjustment">Инвентаризация</option>
          </select>
          <input name="quantity" placeholder="Количество" type="number" min="1" required />
          <input name="comment" placeholder="Комментарий" />
          <button type="submit">Провести</button>
        </form>
        <ul id="movementsList" class="feed"></ul>
      </section>
    </main>

    <div id="toast" class="toast" hidden></div>
    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
