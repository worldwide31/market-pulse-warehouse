services:
  - type: web
    name: warehouse-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: AUTO_SEED
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: warehouse-db
          property: connectionString

  - type: web
    name: warehouse-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    envVars:
      - key: API_BASE_URL
        value: https://warehouse-api.onrender.com

databases:
  - name: warehouse-db
    databaseName: warehouse
    user: warehouse
