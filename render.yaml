services:
  - type: web
    name: warehouse-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: warehouse-db
          property: connectionString

  - type: web
    name: warehouse-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile

databases:
  - name: warehouse-db
    databaseName: warehouse
    user: warehouse
