services:
  postgres:
    image: postgres:16-alpine
    container_name: warehouse_postgres
    environment:
      POSTGRES_DB: warehouse
      POSTGRES_USER: warehouse
      POSTGRES_PASSWORD: warehouse
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warehouse -d warehouse"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    container_name: warehouse_api
    environment:
      DATABASE_URL: postgresql+psycopg://warehouse:warehouse@postgres:5432/warehouse
      AUTO_SEED: "true"
      PORT: "8000"
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: warehouse_frontend
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  postgres_data:
